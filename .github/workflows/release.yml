name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Regenerate icon
        run: python scripts/generate_icon.py

      - name: Build EXE
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name FlowClone `
            --icon assets/flowclone.ico `
            --hidden-import pystray._win32 `
            --collect-submodules pystray `
            --collect-submodules sounddevice `
            main.py

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: FlowClone-windows
          path: dist/FlowClone.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FlowClone.exe
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Install

            1. Download `FlowClone.exe` below.
            2. Double-click to launch. A microphone icon will appear in your system tray.
            3. Right-click the tray icon → **Settings** (or press `Ctrl+Shift+F`) to paste your OpenAI or Groq API key.
            4. Hold `Right Alt` anywhere in Windows, speak, release. Your words appear as text at the cursor.

            Windows may warn about running an unsigned EXE — this is expected for small open-source projects. Click **More info → Run anyway** if you trust the source. You can also verify the binary matches the source by cloning the repo and running `build.bat` yourself.

            See the [README](https://github.com/${{ github.repository }}#privacy--permissions) for what permissions FlowClone needs and what data gets sent where.
